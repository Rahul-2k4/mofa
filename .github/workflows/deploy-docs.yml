name: Deploy mdBook to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'docs/mofa-doc/**'
  pull_request:
    branches:
      - main
    paths:
      - 'docs/mofa-doc/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs/mofa-doc
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install mdBook
        run: |
          mkdir -p ~/.local/bin
          curl -sSL https://github.com/rust-lang/mdBook/releases/download/v0.4.40/mdbook-v0.4.40-x86_64-unknown-linux-gnu.tar.gz | tar -xz -C ~/.local/bin
          cargo install mdbook-mermaid
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Build mdBook (EN + ZH)
        run: ./scripts/build-docs.sh

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/mofa-doc/book

  deploy:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
